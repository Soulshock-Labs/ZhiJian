<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
body { background: #f0ead6; padding: 28px 32px; font-family: var(--font-sans);
  background-image: radial-gradient(circle at 15% 85%, rgba(232,132,90,.07) 0%, transparent 50%); }
.grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
.pose-card {
  background: #fdfaf2; border-radius: 16px; padding: 16px 12px 14px;
  box-shadow: 0 1px 4px rgba(60,40,20,.05), 0 8px 28px -10px rgba(60,40,20,.14);
  border: 1px solid rgba(200,175,120,.18);
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.pose-name { font-size: 10px; font-family: var(--font-mono); letter-spacing: 1px; color: #9a8a78; text-align: center; }
.pose-cn { font-family: 'Ma Shan Zheng', serif; font-size: 15px; color: #1c1812; text-align: center; }
.pose-use { font-size: 9px; color: var(--color-ink-4); text-align: center; line-height: 1.5; }

/* Shared chick defs */
.chick-yellow { fill: #f5c036; }
.chick-lite   { fill: #fde68a; }
.chick-dark   { fill: #e8a820; }
.chick-beak   { fill: oklch(0.62 0.14 40); }
</style>
</head>
<body>
<div class="grid">

  <!-- 1. 思考 Thinking -->
  <div class="pose-card">
    <svg width="100" height="115" viewBox="0 0 220 250" fill="none">
      <!-- shadow -->
      <ellipse cx="110" cy="244" rx="45" ry="6" fill="rgba(60,40,20,.08)"/>
      <!-- body -->
      <ellipse cx="110" cy="178" rx="65" ry="60" fill="#f5c036"/>
      <ellipse cx="110" cy="190" rx="42" ry="38" fill="#fde68a" opacity=".55"/>
      <!-- left wing down -->
      <ellipse cx="52" cy="182" rx="24" ry="16" fill="#e8a820" transform="rotate(-20 52 182)"/>
      <!-- right wing raised to chin -->
      <ellipse cx="165" cy="155" rx="22" ry="14" fill="#e8a820" transform="rotate(-50 165 155)"/>
      <!-- legs -->
      <line x1="90" y1="232" x2="83" y2="244" stroke="oklch(0.62 0.14 40)" stroke-width="4.5" stroke-linecap="round"/>
      <path d="M83 244 L77 248 M83 244 L85 249 M83 244 L89 247" stroke="oklch(0.62 0.14 40)" stroke-width="3.5" stroke-linecap="round"/>
      <line x1="130" y1="232" x2="137" y2="244" stroke="oklch(0.62 0.14 40)" stroke-width="4.5" stroke-linecap="round"/>
      <path d="M137 244 L131 248 M137 244 L139 249 M137 244 L143 247" stroke="oklch(0.62 0.14 40)" stroke-width="3.5" stroke-linecap="round"/>
      <!-- head tilted slightly -->
      <circle cx="113" cy="108" r="56" fill="#f5c036"/>
      <ellipse cx="113" cy="118" rx="34" ry="26" fill="#fde68a" opacity=".4"/>
      <!-- fluff -->
      <ellipse cx="113" cy="54" rx="9" ry="14" fill="#f5c036" transform="rotate(-15 113 54)"/>
      <ellipse cx="126" cy="60" rx="7" ry="11" fill="#f0b830" transform="rotate(5 126 60)"/>
      <!-- eyes: one narrowed (thinking) -->
      <ellipse cx="89" cy="104" rx="18" ry="19" fill="white"/>
      <circle cx="91" cy="106" r="12" fill="#2a2218"/>
      <circle cx="86" cy="100" r="4.5" fill="white"/>
      <circle cx="91" cy="107" r="5.5" fill="#0f0d0a"/>
      <!-- right eye narrowed -->
      <ellipse cx="137" cy="104" rx="18" ry="12" fill="white"/>
      <ellipse cx="139" cy="106" rx="11" ry="9" fill="#2a2218"/>
      <circle cx="134" cy="101" r="4" fill="white"/>
      <ellipse cx="139" cy="107" rx="5" ry="4" fill="#0f0d0a"/>
      <!-- beak -->
      <path d="M106 122 Q113 130 120 122 Q113 118 106 122Z" fill="oklch(0.62 0.14 40)"/>
      <!-- thought bubble dots -->
      <circle cx="152" cy="72" r="4" fill="#d9d0bd"/>
      <circle cx="162" cy="60" r="6" fill="#d9d0bd"/>
      <circle cx="175" cy="46" r="8.5" fill="#d9d0bd"/>
      <!-- question mark in bubble -->
      <text x="172" y="51" text-anchor="middle" font-size="10" fill="#8a8178" font-weight="700">?</text>
      <!-- cap -->
      <rect x="88" y="56" width="50" height="7" rx="2" fill="#2a2218"/>
      <rect x="100" y="46" width="25" height="11" rx="2" fill="#2a2218"/>
      <line x1="136" y1="60" x2="141" y2="70" stroke="#2a2218" stroke-width="2" stroke-linecap="round"/>
      <circle cx="141" cy="72" r="2.5" fill="oklch(0.62 0.14 40)"/>
    </svg>
    <div>
      <div class="pose-cn">思考中</div>
      <div class="pose-name">THINKING</div>
      <div class="pose-use">AI 生成中 / 加载状态</div>
    </div>
  </div>

  <!-- 2. 开心 Happy -->
  <div class="pose-card">
    <svg width="100" height="115" viewBox="0 0 220 250" fill="none">
      <ellipse cx="110" cy="244" rx="45" ry="6" fill="rgba(60,40,20,.08)"/>
      <!-- body bounced up -->
      <ellipse cx="110" cy="172" rx="68" ry="62" fill="#f5c036"/>
      <ellipse cx="110" cy="185" rx="44" ry="40" fill="#fde68a" opacity=".55"/>
      <!-- wings spread wide -->
      <ellipse cx="42" cy="168" rx="30" ry="18" fill="#e8a820" transform="rotate(-35 42 168)"/>
      <ellipse cx="178" cy="168" rx="30" ry="18" fill="#e8a820" transform="rotate(35 178 168)"/>
      <!-- sparkles -->
      <text x="22" y="140" font-size="14" fill="oklch(0.62 0.14 40)" opacity=".8">✦</text>
      <text x="185" y="135" font-size="10" fill="#f5c036" opacity=".9">✦</text>
      <text x="175" y="155" font-size="7" fill="oklch(0.62 0.14 40)" opacity=".7">✦</text>
      <!-- legs jump -->
      <line x1="90" y1="228" x2="80" y2="244" stroke="oklch(0.62 0.14 40)" stroke-width="4.5" stroke-linecap="round"/>
      <path d="M80 244 L74 248 M80 244 L82 249 M80 244 L86 247" stroke="oklch(0.62 0.14 40)" stroke-width="3.5" stroke-linecap="round"/>
      <line x1="130" y1="228" x2="140" y2="244" stroke="oklch(0.62 0.14 40)" stroke-width="4.5" stroke-linecap="round"/>
      <path d="M140 244 L134 248 M140 244 L142 249 M140 244 L146 247" stroke="oklch(0.62 0.14 40)" stroke-width="3.5" stroke-linecap="round"/>
      <!-- head -->
      <circle cx="110" cy="106" r="57" fill="#f5c036"/>
      <ellipse cx="110" cy="116" rx="35" ry="27" fill="#fde68a" opacity=".45"/>
      <!-- fluff excited -->
      <ellipse cx="108" cy="50" rx="10" ry="16" fill="#f5c036" transform="rotate(-20 108 50)"/>
      <ellipse cx="122" cy="55" rx="8" ry="13" fill="#f0b830" transform="rotate(15 122 55)"/>
      <ellipse cx="94" cy="55" rx="8" ry="13" fill="#f0b830" transform="rotate(-15 94 55)"/>
      <!-- eyes happy crescents -->
      <path d="M72 102 Q88 88 104 102" stroke="#2a2218" stroke-width="5" stroke-linecap="round" fill="none"/>
      <path d="M116 102 Q132 88 148 102" stroke="#2a2218" stroke-width="5" stroke-linecap="round" fill="none"/>
      <!-- blush big -->
      <ellipse cx="68" cy="118" rx="14" ry="9" fill="oklch(0.62 0.14 40)" opacity=".3"/>
      <ellipse cx="152" cy="118" rx="14" ry="9" fill="oklch(0.62 0.14 40)" opacity=".3"/>
      <!-- big smile beak -->
      <path d="M100 120 Q110 135 120 120 Q110 115 100 120Z" fill="oklch(0.62 0.14 40)"/>
      <path d="M101 121 Q110 130 119 121" stroke="oklch(0.56 0.15 40)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <!-- cap -->
      <rect x="86" y="54" width="50" height="7" rx="2" fill="#2a2218"/>
      <rect x="98" y="44" width="26" height="11" rx="2" fill="#2a2218"/>
      <line x1="134" y1="58" x2="140" y2="68" stroke="#2a2218" stroke-width="2" stroke-linecap="round"/>
      <circle cx="140" cy="70" r="2.5" fill="oklch(0.62 0.14 40)"/>
    </svg>
    <div>
      <div class="pose-cn">成功！</div>
      <div class="pose-name">SUCCESS</div>
      <div class="pose-use">生成完成 / 操作成功</div>
    </div>
  </div>

  <!-- 3. 写字 Writing -->
  <div class="pose-card">
    <svg width="100" height="115" viewBox="0 0 220 250" fill="none">
      <ellipse cx="110" cy="244" rx="45" ry="6" fill="rgba(60,40,20,.08)"/>
      <ellipse cx="110" cy="178" rx="65" ry="60" fill="#f5c036"/>
      <ellipse cx="110" cy="190" rx="42" ry="38" fill="#fde68a" opacity=".55"/>
      <!-- left wing tucked -->
      <ellipse cx="52" cy="185" rx="22" ry="14" fill="#e8a820" transform="rotate(-15 52 185)"/>
      <!-- right wing holding pen -->
      <ellipse cx="165" cy="175" rx="24" ry="15" fill="#e8a820" transform="rotate(20 165 175)"/>
      <!-- paper on desk -->
      <rect x="60" y="208" width="100" height="30" rx="4" fill="#fdfaf2" stroke="#d9d0bd" stroke-width="1.5"/>
      <line x1="68" y1="218" x2="152" y2="218" stroke="#ebe3d1" stroke-width="1.2"/>
      <line x1="68" y1="226" x2="140" y2="226" stroke="#ebe3d1" stroke-width="1.2"/>
      <!-- pen in wing -->
      <rect x="152" y="168" width="4" height="28" rx="2" fill="#2a2218" transform="rotate(-30 154 182)"/>
      <path d="M146 192 L148 198 L152 194 Z" fill="oklch(0.62 0.14 40)" transform="rotate(-30 149 195)"/>
      <!-- legs -->
      <line x1="90" y1="232" x2="84" y2="244" stroke="oklch(0.62 0.14 40)" stroke-width="4.5" stroke-linecap="round"/>
      <path d="M84 244 L78 248 M84 244 L86 249 M84 244 L90 247" stroke="oklch(0.62 0.14 40)" stroke-width="3.5" stroke-linecap="round"/>
      <line x1="130" y1="232" x2="136" y2="244" stroke="oklch(0.62 0.14 40)" stroke-width="4.5" stroke-linecap="round"/>
      <path d="M136 244 L130 248 M136 244 L138 249 M136 244 L142 247" stroke="oklch(0.62 0.14 40)" stroke-width="3.5" stroke-linecap="round"/>
      <!-- head focused -->
      <circle cx="108" cy="108" r="56" fill="#f5c036"/>
      <ellipse cx="108" cy="118" rx="34" ry="26" fill="#fde68a" opacity=".4"/>
      <!-- fluff -->
      <ellipse cx="108" cy="54" rx="9" ry="14" fill="#f5c036"/>
      <ellipse cx="120" cy="59" rx="7" ry="11" fill="#f0b830" transform="rotate(8 120 59)"/>
      <!-- eyes focused/concentrated -->
      <ellipse cx="87" cy="104" rx="17" ry="18" fill="white"/>
      <circle cx="89" cy="106" r="12" fill="#2a2218"/>
      <circle cx="84" cy="100" r="4.5" fill="white"/>
      <circle cx="89" cy="107" r="5.5" fill="#0f0d0a"/>
      <ellipse cx="133" cy="104" rx="17" ry="18" fill="white"/>
      <circle cx="135" cy="106" r="12" fill="#2a2218"/>
      <circle cx="130" cy="100" r="4.5" fill="white"/>
      <circle cx="135" cy="107" r="5.5" fill="#0f0d0a"/>
      <!-- beak small focused -->
      <path d="M102 122 Q108 128 114 122 Q108 118 102 122Z" fill="oklch(0.62 0.14 40)"/>
      <!-- cap -->
      <rect x="86" y="56" width="46" height="7" rx="2" fill="#2a2218"/>
      <rect x="97" y="46" width="24" height="11" rx="2" fill="#2a2218"/>
      <line x1="131" y1="60" x2="136" y2="70" stroke="#2a2218" stroke-width="2" stroke-linecap="round"/>
      <circle cx="136" cy="72" r="2.5" fill="oklch(0.62 0.14 40)"/>
    </svg>
    <div>
      <div class="pose-cn">记录中</div>
      <div class="pose-name">WRITING</div>
      <div class="pose-use">教案输入 / 记录功能</div>
    </div>
  </div>

  <!-- 4. 招手 Waving -->
  <div class="pose-card">
    <svg width="100" height="115" viewBox="0 0 220 250" fill="none">
      <ellipse cx="110" cy="244" rx="45" ry="6" fill="rgba(60,40,20,.08)"/>
      <ellipse cx="110" cy="178" rx="65" ry="60" fill="#f5c036"/>
      <ellipse cx="110" cy="190" rx="42" ry="38" fill="#fde68a" opacity=".55"/>
      <!-- left wing waving up high -->
      <ellipse cx="45" cy="148" rx="26" ry="15" fill="#e8a820" transform="rotate(-60 45 148)"/>
      <ellipse cx="45" cy="148" rx="18" ry="10" fill="#f5c036" transform="rotate(-60 45 148)"/>
      <!-- wave lines -->
      <path d="M28 118 Q22 110 28 103" stroke="#e8a820" stroke-width="2" stroke-linecap="round" fill="none" opacity=".7"/>
      <path d="M18 122 Q10 112 18 103" stroke="#e8a820" stroke-width="1.5" stroke-linecap="round" fill="none" opacity=".5"/>
      <!-- right wing down -->
      <ellipse cx="172" cy="185" rx="24" ry="15" fill="#e8a820" transform="rotate(20 172 185)"/>
      <!-- legs -->
      <line x1="90" y1="232" x2="83" y2="244" stroke="oklch(0.62 0.14 40)" stroke-width="4.5" stroke-linecap="round"/>
      <path d="M83 244 L77 248 M83 244 L85 249 M83 244 L89 247" stroke="oklch(0.62 0.14 40)" stroke-width="3.5" stroke-linecap="round"/>
      <line x1="130" y1="232" x2="137" y2="244" stroke="oklch(0.62 0.14 40)" stroke-width="4.5" stroke-linecap="round"/>
      <path d="M137 244 L131 248 M137 244 L139 249 M137 244 L143 247" stroke="oklch(0.62 0.14 40)" stroke-width="3.5" stroke-linecap="round"/>
      <!-- head -->
      <circle cx="110" cy="108" r="57" fill="#f5c036"/>
      <ellipse cx="110" cy="118" rx="35" ry="27" fill="#fde68a" opacity=".45"/>
      <ellipse cx="108" cy="52" rx="10" ry="15" fill="#f5c036" transform="rotate(-10 108 52)"/>
      <ellipse cx="122" cy="57" rx="8" ry="12" fill="#f0b830" transform="rotate(10 122 57)"/>
      <ellipse cx="94" cy="57" rx="8" ry="12" fill="#f0b830" transform="rotate(-10 94 57)"/>
      <!-- friendly eyes -->
      <ellipse cx="87" cy="104" rx="18" ry="19" fill="white"/>
      <circle cx="89" cy="106" r="13" fill="#2a2218"/>
      <circle cx="84" cy="100" r="5" fill="white"/>
      <circle cx="89" cy="107" r="6" fill="#0f0d0a"/>
      <ellipse cx="133" cy="104" rx="18" ry="19" fill="white"/>
      <circle cx="135" cy="106" r="13" fill="#2a2218"/>
      <circle cx="130" cy="100" r="5" fill="white"/>
      <circle cx="135" cy="107" r="6" fill="#0f0d0a"/>
      <!-- blush -->
      <ellipse cx="68" cy="118" rx="12" ry="7" fill="oklch(0.62 0.14 40)" opacity=".25"/>
      <ellipse cx="152" cy="118" rx="12" ry="7" fill="oklch(0.62 0.14 40)" opacity=".25"/>
      <!-- smile beak -->
      <path d="M103 122 Q110 131 117 122 Q110 117 103 122Z" fill="oklch(0.62 0.14 40)"/>
      <!-- cap -->
      <rect x="86" y="54" width="50" height="7" rx="2" fill="#2a2218"/>
      <rect x="98" y="44" width="26" height="11" rx="2" fill="#2a2218"/>
      <line x1="134" y1="58" x2="140" y2="68" stroke="#2a2218" stroke-width="2" stroke-linecap="round"/>
      <circle cx="140" cy="70" r="2.5" fill="oklch(0.62 0.14 40)"/>
    </svg>
    <div>
      <div class="pose-cn">你好！</div>
      <div class="pose-name">GREETING</div>
      <div class="pose-use">欢迎页 / 首次登录</div>
    </div>
  </div>

  <!-- 5. 休息 Sleeping -->
  <div class="pose-card">
    <svg width="100" height="115" viewBox="0 0 220 250" fill="none">
      <ellipse cx="110" cy="244" rx="45" ry="6" fill="rgba(60,40,20,.08)"/>
      <!-- sleeping body rounder -->
      <ellipse cx="110" cy="185" rx="70" ry="58" fill="#f5c036"/>
      <ellipse cx="110" cy="196" rx="46" ry="38" fill="#fde68a" opacity=".5"/>
      <!-- wings folded in -->
      <ellipse cx="50" cy="190" rx="22" ry="14" fill="#e8a820" transform="rotate(-10 50 190)"/>
      <ellipse cx="170" cy="190" rx="22" ry="14" fill="#e8a820" transform="rotate(10 170 190)"/>
      <!-- legs -->
      <line x1="90" y1="235" x2="84" y2="244" stroke="oklch(0.62 0.14 40)" stroke-width="4.5" stroke-linecap="round"/>
      <path d="M84 244 L78 248 M84 244 L86 249 M84 244 L90 247" stroke="oklch(0.62 0.14 40)" stroke-width="3.5" stroke-linecap="round"/>
      <line x1="130" y1="235" x2="136" y2="244" stroke="oklch(0.62 0.14 40)" stroke-width="4.5" stroke-linecap="round"/>
      <path d="M136 244 L130 248 M136 244 L138 249 M136 244 L142 247" stroke="oklch(0.62 0.14 40)" stroke-width="3.5" stroke-linecap="round"/>
      <!-- head drooped forward -->
      <circle cx="110" cy="114" r="56" fill="#f5c036"/>
      <ellipse cx="110" cy="124" rx="35" ry="26" fill="#fde68a" opacity=".4"/>
      <!-- fluff droopy -->
      <ellipse cx="110" cy="60" rx="9" ry="13" fill="#f5c036" transform="rotate(-5 110 60)"/>
      <!-- closed eyes zzz -->
      <path d="M80 108 Q88 116 96 108" stroke="#2a2218" stroke-width="4.5" stroke-linecap="round" fill="none"/>
      <path d="M124 108 Q132 116 140 108" stroke="#2a2218" stroke-width="4.5" stroke-linecap="round" fill="none"/>
      <!-- zzz bubbles -->
      <text x="150" y="80" font-size="12" fill="#b8ad9c" font-weight="700" opacity=".8">z</text>
      <text x="160" y="64" font-size="16" fill="#b8ad9c" font-weight="700" opacity=".7">z</text>
      <text x="172" y="46" font-size="20" fill="#b8ad9c" font-weight="700" opacity=".6">z</text>
      <!-- tiny beak relaxed -->
      <ellipse cx="110" cy="126" rx="7" ry="5" fill="oklch(0.62 0.14 40)"/>
      <!-- cap tilted -->
      <rect x="85" y="64" width="50" height="7" rx="2" fill="#2a2218" transform="rotate(8 110 68)"/>
      <rect x="96" y="54" width="26" height="11" rx="2" fill="#2a2218" transform="rotate(8 109 60)"/>
    </svg>
    <div>
      <div class="pose-cn">休息中</div>
      <div class="pose-name">SLEEPING</div>
      <div class="pose-use">空状态 / 无内容页</div>
    </div>
  </div>

</div>
</body>
</html>
