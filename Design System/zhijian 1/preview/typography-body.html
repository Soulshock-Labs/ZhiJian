<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{background:var(--color-paper);padding:20px 24px;font-family:var(--font-sans);}
.row{display:flex;align-items:baseline;gap:16px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--color-rule-soft);}
.row:last-child{border-bottom:none;margin-bottom:0;}
.label{font-size:10px;font-family:var(--font-mono);color:var(--color-ink-4);letter-spacing:.8px;min-width:80px;flex-shrink:0;}
</style></head><body>
<div class="row">
  <span class="label">BODY · 15px</span>
  <span style="font-size:var(--fs-body);line-height:var(--lh-body);color:var(--color-ink-2)">老师用小纸笺记录孩子的成长与活动，您随时都能看到他们的精彩瞬间。</span>
</div>
<div class="row">
  <span class="label">BODY-SM · 13px</span>
  <span style="font-size:var(--fs-body-sm);line-height:var(--lh-body-sm);color:var(--color-ink-2)">围绕本周主题开展五大领域的学习活动，健康、语言、科学、艺术、社会均衡发展。</span>
</div>
<div class="row">
  <span class="label">META · 12px</span>
  <span style="font-size:var(--fs-meta);line-height:var(--lh-meta);color:var(--color-ink-3)">© 2026 小纸笺 · zhijian.me · 联系我们</span>
</div>
<div class="row">
  <span class="label">MICRO · 11px</span>
  <span style="font-size:var(--fs-micro);line-height:var(--lh-micro);color:var(--color-ink-4);font-family:var(--font-mono);letter-spacing:1.2px;text-transform:uppercase">WEEKLY · TODAY · RESOURCES</span>
</div>
<div class="row">
  <span class="label">NUM · Inter</span>
  <span style="font-size:var(--fs-body);font-family:var(--font-num);font-variant-numeric:tabular-nums;color:var(--color-ink)">114 · 3 · 08:00 · 18%</span>
</div>
<div class="row">
  <span class="label">MONO</span>
  <span style="font-size:var(--fs-body-sm);font-family:var(--font-mono);color:var(--color-ink-3)">WEEKLY · RESOURCES · API_KEY</span>
</div>
</body></html>
