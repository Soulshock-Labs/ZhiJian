<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{background:var(--color-paper);padding:20px 24px;font-family:var(--font-sans);}
.row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center;}
.section-label{font-size:10px;font-family:var(--font-mono);letter-spacing:1px;text-transform:uppercase;color:var(--color-ink-4);margin-bottom:8px;}
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:var(--radius-pill);font-size:var(--fs-meta);font-weight:500;border:1px solid var(--color-rule);background:var(--color-paper-hi);color:var(--color-ink-2);}
.chip-dot{width:6px;height:6px;border-radius:50%;background:var(--color-brand);opacity:.7;}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:var(--radius-pill);font-size:var(--fs-meta);font-weight:600;}
.badge-brand{background:var(--color-brand-tint);color:var(--color-brand);}
.badge-success{background:var(--color-success-tint);color:var(--color-success-ink);}
.badge-warn{background:var(--color-warn-tint);color:var(--color-warn-ink);}
.badge-info{background:var(--color-info-tint);color:var(--color-info-ink);}
.badge-paper{background:var(--color-paper-sunk);color:var(--color-ink-3);}
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:var(--radius-xs);font-size:var(--fs-meta);font-weight:500;background:var(--color-paper-sunk);color:var(--color-ink-3);}
</style></head><body>
<div class="section-label">Chips — 功能标签</div>
<div class="row">
  <span class="chip"><span class="chip-dot"></span>孩子成长档案</span>
  <span class="chip"><span class="chip-dot"></span>每日观察推送</span>
  <span class="chip"><span class="chip-dot"></span>家园留言板</span>
  <span class="chip"><span class="chip-dot"></span>活动相册</span>
  <span class="chip"><span class="chip-dot"></span>健康与饮食记录</span>
</div>
<div class="section-label">Badges — 状态标识</div>
<div class="row">
  <span class="badge badge-brand">进行中</span>
  <span class="badge badge-success">已完成</span>
  <span class="badge badge-warn">待审核</span>
  <span class="badge badge-info">新功能</span>
  <span class="badge badge-paper">即将上线</span>
</div>
<div class="section-label">Tags — 分类标签</div>
<div class="row">
  <span class="tag">语言领域</span>
  <span class="tag">中班</span>
  <span class="tag">周一</span>
  <span class="tag">健康</span>
  <span class="tag">艺术</span>
  <span class="tag">科学</span>
</div>
<div class="section-label">Count Badges — 计数</div>
<div class="row">
  <div style="display:flex;align-items:center;gap:8px;height:36px;padding:0 12px;border-radius:var(--radius-pill);background:var(--color-paper-hi);border:1px solid var(--color-rule);">
    <span style="font-size:var(--fs-body-sm);color:var(--color-ink-2)">模板中心</span>
    <span style="font-size:var(--fs-meta);font-family:var(--font-mono);color:var(--color-ink-3)">114</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px;height:36px;padding:0 12px;border-radius:var(--radius-pill);background:var(--color-paper-hi);border:1px solid var(--color-rule);">
    <span style="font-size:var(--fs-body-sm);color:var(--color-ink-2)">工作台</span>
    <span style="font-size:var(--fs-meta);font-family:var(--font-mono);color:var(--color-ink-3)">3</span>
  </div>
</div>
</body></html>
