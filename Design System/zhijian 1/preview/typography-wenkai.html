<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{background:var(--color-paper);padding:24px 28px;}
.brand-row{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.logo-mark{width:40px;height:40px;border-radius:var(--radius-xs);background:var(--color-brand);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--font-wenkai);font-size:22px;font-weight:600;flex-shrink:0;}
.brand-name{font-family:var(--font-wenkai);font-size:28px;font-weight:600;color:var(--color-ink);letter-spacing:.08em;}
.specimen{margin-bottom:14px;}
.meta{font-size:10px;font-family:var(--font-mono);color:var(--color-ink-4);letter-spacing:.8px;margin-bottom:3px;}
</style></head><body>
<div class="brand-row">
  <div class="logo-mark">笺</div>
  <div class="brand-name">小纸笺</div>
</div>
<div class="specimen">
  <div class="meta">WENKAI · EXPRESSIVE HEADING</div>
  <div style="font-family:var(--font-wenkai);font-size:var(--fs-h2);color:var(--color-ink);line-height:1.4">每个孩子都是独特的存在</div>
</div>
<div class="specimen">
  <div class="meta">WENKAI · QUOTE / POETIC</div>
  <div style="font-family:var(--font-wenkai);font-size:var(--fs-h3);color:var(--color-ink-2);line-height:1.8">我们用文字和记录，<br>让您看见他们成长的每一步。</div>
</div>
<div class="specimen">
  <div class="meta">WENKAI · BODY / NOTES</div>
  <div style="font-family:var(--font-wenkai);font-size:var(--fs-body);color:var(--color-ink-2);line-height:var(--lh-body)">晨间接待，老师观察孩子的状态和情绪，记录入园情况。</div>
</div>
</body></html>
