<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{background:var(--color-paper);padding:24px 28px;font-family:var(--font-sans);}
.specimen{margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--color-rule-soft);}
.specimen:last-child{border-bottom:none;margin-bottom:0;}
.meta{font-size:var(--fs-micro);font-family:var(--font-mono);color:var(--color-ink-4);margin-bottom:4px;letter-spacing:.8px;}
</style></head><body>
<div class="specimen">
  <div class="meta">DISPLAY · 48px · 1.15</div>
  <div style="font-size:var(--fs-display);line-height:var(--lh-display);font-weight:700;color:var(--color-ink)">智能创作助手</div>
</div>
<div class="specimen">
  <div class="meta">H1 · 34px · 1.25</div>
  <div style="font-size:var(--fs-h1);line-height:var(--lh-h1);font-weight:700;color:var(--color-ink)">每个孩子都是独特的存在</div>
</div>
<div class="specimen">
  <div class="meta">H2 · 26px · 1.30</div>
  <div style="font-size:var(--fs-h2);line-height:var(--lh-h2);font-weight:700;color:var(--color-ink)">本周活动计划与观察记录</div>
</div>
<div class="specimen">
  <div class="meta">H3 · 20px · 1.40</div>
  <div style="font-size:var(--fs-h3);line-height:var(--lh-h3);font-weight:600;color:var(--color-ink)">智能教案生成 · 家园共育平台</div>
</div>
<div class="specimen">
  <div class="meta">H4 · 17px · 1.45</div>
  <div style="font-size:var(--fs-h4);line-height:var(--lh-h4);font-weight:600;color:var(--color-ink)">孩子在园的每一天</div>
</div>
</body></html>
