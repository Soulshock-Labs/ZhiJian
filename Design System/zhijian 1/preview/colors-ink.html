<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{background:var(--color-paper);padding:20px;font-family:var(--font-sans);}
.row{display:flex;gap:8px;margin-bottom:10px;}
.swatch{flex:1;border-radius:var(--radius-sm);padding:14px 12px;min-height:64px;display:flex;flex-direction:column;justify-content:flex-end;}
.swatch label{font-size:11px;font-family:var(--font-mono);opacity:.7;display:block;margin-bottom:2px;}
.swatch span{font-size:var(--fs-body-sm);font-weight:600;}
</style></head><body>
<div class="row">
  <div class="swatch" style="background:var(--color-ink);color:#f6f1e7">
    <label>ink</label><span>#2a2520 · 正文</span>
  </div>
  <div class="swatch" style="background:var(--color-ink-2);color:#f6f1e7">
    <label>ink-2</label><span>#5a5148 · 次要</span>
  </div>
  <div class="swatch" style="background:var(--color-ink-3);color:#f6f1e7">
    <label>ink-3</label><span>#8a8178 · 辅助</span>
  </div>
  <div class="swatch" style="background:var(--color-ink-4);color:#2a2520">
    <label>ink-4</label><span>#b8ad9c · 禁用</span>
  </div>
</div>
<div class="row">
  <div class="swatch" style="background:var(--color-paper);border:1px solid var(--color-rule);color:var(--color-ink-2)">
    <label>paper</label><span>#f6f1e7 · 主背景</span>
  </div>
  <div class="swatch" style="background:var(--color-rule);color:var(--color-ink-2);flex:2">
    <label>rule</label><span>#d9d0bd · 分割线</span>
  </div>
  <div class="swatch" style="background:var(--color-rule-soft);color:var(--color-ink-3);flex:2">
    <label>rule-soft</label><span>#ebe3d1 · 浅分割线</span>
  </div>
</div>
</body></html>
