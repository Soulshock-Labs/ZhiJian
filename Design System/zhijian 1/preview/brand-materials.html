<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #e8e0cc; padding: 28px 32px; font-family: var(--font-sans); }
.row { display: flex; gap: 18px; flex-wrap: wrap; margin-bottom: 20px; align-items: flex-start; }
.label { font-size: 10px; font-family: var(--font-mono); letter-spacing: 1.2px; text-transform: uppercase; color: #9a8a78; margin-bottom: 10px; }

/* ── Splash screen ── */
.splash {
  width: 200px; height: 356px; border-radius: 20px; overflow: hidden;
  background: linear-gradient(160deg, #fff8f0 0%, var(--color-brand-tint) 60%, #fff4ec 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 0; position: relative;
  box-shadow: 0 8px 32px rgba(60,40,20,.18);
}
.splash-glow {
  position: absolute; width: 200px; height: 200px;
  background: radial-gradient(circle, oklch(0.62 0.14 40 / 0.12) 0%, transparent 70%);
  top: 20px; pointer-events: none;
}
.splash-brand { display: flex; flex-direction: column; align-items: center; gap: 4px; margin-top: 20px; }
.splash-sq { width: 44px; height: 44px; border-radius: 11px; background: var(--color-brand); display: flex; align-items: center; justify-content: center; font-family: 'Ma Shan Zheng', serif; font-size: 26px; color: #fff; box-shadow: 0 4px 16px oklch(0.62 0.14 40 / 0.35); }
.splash-name { font-family: 'Ma Shan Zheng', serif; font-size: 22px; color: var(--color-ink); margin-top: 6px; }
.splash-name small { font-family: 'Noto Serif SC', serif; font-weight: 300; font-size: 11px; color: var(--color-brand); letter-spacing: .3em; }
.splash-tagline { font-size: 11px; color: var(--color-ink-3); margin-top: 4px; letter-spacing: .05em; }
.splash-loading { margin-top: 36px; display: flex; gap: 5px; }
.splash-dot { width: 6px; height: 6px; border-radius: 3px; background: var(--color-brand); opacity: .35; }
.splash-dot:nth-child(2) { opacity: .6; }
.splash-dot:nth-child(3) { opacity: .9; }

/* ── Welcome card ── */
.welcome {
  width: 200px; border-radius: 20px; overflow: hidden;
  background: var(--color-paper-hi);
  box-shadow: 0 8px 32px rgba(60,40,20,.15);
  border: 1px solid rgba(200,175,120,.2);
}
.welcome-top { background: linear-gradient(160deg, oklch(0.94 0.05 55) 0%, #fff8f0 100%); padding: 20px 16px 16px; text-align: center; }
.welcome-body { padding: 16px; }
.welcome-btn { width: 100%; height: 38px; border-radius: 19px; background: var(--color-brand); color: #fff; border: none; font-size: 13px; font-weight: 600; font-family: var(--font-sans); cursor: pointer; margin-bottom: 8px; box-shadow: 0 3px 12px oklch(0.62 0.14 40 / 0.28); }
.welcome-ghost { width: 100%; height: 34px; border-radius: 17px; background: none; color: var(--color-ink-3); border: 1px solid var(--color-rule); font-size: 12px; font-family: var(--font-sans); cursor: pointer; }

/* ── Empty state ── */
.empty {
  width: 200px; height: 240px; border-radius: 16px;
  background: var(--color-paper-hi); border: 1px solid rgba(200,175,120,.2);
  box-shadow: 0 4px 20px rgba(60,40,20,.08);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; padding: 20px;
}
.empty-text { text-align: center; }
.empty-title { font-size: 14px; font-weight: 600; color: var(--color-ink); margin-bottom: 4px; }
.empty-sub { font-size: 11px; color: var(--color-ink-3); line-height: 1.6; }
.empty-btn { height: 34px; padding: 0 18px; border-radius: 17px; background: var(--color-brand); color: #fff; border: none; font-size: 12px; font-weight: 600; font-family: var(--font-sans); cursor: pointer; margin-top: 4px; }

/* ── Loading state ── */
.loading-card {
  width: 200px; height: 180px; border-radius: 16px;
  background: var(--color-paper-hi); border: 1px solid rgba(200,175,120,.2);
  box-shadow: 0 4px 20px rgba(60,40,20,.08);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 12px; padding: 20px;
}
.loading-dots { display: flex; gap: 5px; }
.ld { width: 8px; height: 8px; border-radius: 4px; background: var(--color-brand); opacity: .4; }
.ld:nth-child(2) { opacity: .65; }
.ld:nth-child(3) { opacity: .9; }

/* ── Error state ── */
.error-card {
  width: 200px; border-radius: 16px;
  background: oklch(0.95 0.03 38); border: 1px solid oklch(0.61 0.13 38 / 0.2);
  box-shadow: 0 4px 20px rgba(60,40,20,.08);
  padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px;
}
</style>
</head>
<body>

<!-- Row 1: Splash + Welcome -->
<div class="label">启动屏 · 欢迎页</div>
<div class="row">

        <ellipse cx="172" cy="178" rx="28" ry="18" fill="#e8a820" transform="rotate(25 172 178)"/>
        <line x1="88" y1="238" x2="95" y2="228" stroke="oklch(0.62 0.14 40)" stroke-width="5" stroke-linecap="round"/>
        <line x1="132" y1="238" x2="125" y2="228" stroke="oklch(0.62 0.14 40)" stroke-width="5" stroke-linecap="round"/>

        <rect x="85" y="54" width="50" height="8" rx="2" fill="#2a2218"/>
        <rect x="97" y="44" width="26" height="12" rx="2" fill="#2a2218"/>
        <line x1="134" y1="58" x2="140" y2="70" stroke="#2a2218" stroke-width="2" stroke-linecap="round"/>
        <circle cx="140" cy="72" r="3" fill="oklch(0.62 0.14 40)"/>
      </svg>
      <div class="splash-brand">
        <div class="splash-sq">笺</div>
        <div class="splash-name"><small>小</small>纸笺</div>
        <div class="splash-tagline">智能创作助手</div>
      </div>
      <div class="splash-loading">
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
      </div>
    </div>
    <div class="label" style="margin-top:8px;text-align:center">启动屏 Splash</div>
  </div>

  <!-- Welcome page -->
  <div>
    <div class="welcome">
      <div class="welcome-top">
        <svg width="72" height="84" viewBox="0 0 220 260" fill="none">
          <ellipse cx="110" cy="244" rx="45" ry="6" fill="rgba(60,40,20,.08)"/>
          <ellipse cx="110" cy="178" rx="65" ry="60" fill="#f5c036"/>
          <ellipse cx="110" cy="190" rx="42" ry="38" fill="#fde68a" opacity=".55"/>
          <ellipse cx="48" cy="178" rx="28" ry="18" fill="#e8a820" transform="rotate(-25 48 178)"/>
          <ellipse cx="172" cy="178" rx="28" ry="18" fill="#e8a820" transform="rotate(25 172 178)"/>

          <line x1="132" y1="238" x2="125" y2="228" stroke="oklch(0.62 0.14 40)" stroke-width="5" stroke-linecap="round"/>
          <circle cx="110" cy="108" r="58" fill="#f5c036"/>
          <ellipse cx="110" cy="118" rx="36" ry="28" fill="#fde68a" opacity=".4"/>
          <ellipse cx="86" cy="105" rx="19" ry="20" fill="white"/>
          <ellipse cx="134" cy="105" rx="19" ry="20" fill="white"/>
          <circle cx="89" cy="107" r="13" fill="#2a2218"/>

          <circle cx="131" cy="101" r="5" fill="white"/>
          <circle cx="89" cy="108" r="6" fill="#0f0d0a"/>
          <circle cx="137" cy="108" r="6" fill="#0f0d0a"/>
          <path d="M103 122 Q110 132 117 122 Q110 118 103 122Z" fill="oklch(0.62 0.14 40)"/>
          <rect x="85" y="54" width="50" height="8" rx="2" fill="#2a2218"/>
          <rect x="97" y="44" width="26" height="12" rx="2" fill="#2a2218"/>
        </svg>
        <div style="font-family:'Ma Shan Zheng',serif;font-size:22px;color:var(--color-ink);margin-top:8px"><small style="font-family:'Noto Serif SC',serif;font-weight:300;font-size:11px;color:var(--color-brand);letter-spacing:.3em">小</small>纸笺</div>
        <div style="font-size:11px;color:var(--color-ink-3);margin-top:4px">欢迎使用智能创作助手</div>
      </div>
      <div class="welcome-body">
        <button class="welcome-btn">立即登录</button>
        <button class="welcome-ghost">内测兑换码注册</button>

      </div>
    </div>
    <div class="label" style="margin-top:8px;text-align:center">欢迎页 Welcome</div>
  </div>

  <!-- Empty state -->
  <div>
    <div class="empty">
      <svg width="72" height="64" viewBox="0 0 220 200" fill="none">
        <!-- sleeping chick -->
        <ellipse cx="110" cy="170" rx="70" ry="28" fill="#f5c036" opacity=".3"/>
        <ellipse cx="110" cy="155" rx="65" ry="40" fill="#f5c036"/>
        <ellipse cx="110" cy="162" rx="42" ry="28" fill="#fde68a" opacity=".5"/>
        <ellipse cx="52" cy="160" rx="22" ry="14" fill="#e8a820" transform="rotate(-10 52 160)"/>
        <ellipse cx="168" cy="160" rx="22" ry="14" fill="#e8a820" transform="rotate(10 168 160)"/>
        <circle cx="110" cy="108" r="52" fill="#f5c036"/>
        <ellipse cx="110" cy="116" rx="34" ry="24" fill="#fde68a" opacity=".4"/>
        <path d="M82 108 Q90 116 98 108" stroke="#2a2218" stroke-width="4" stroke-linecap="round" fill="none"/>
        <path d="M122 108 Q130 116 138 108" stroke="#2a2218" stroke-width="4" stroke-linecap="round" fill="none"/>
        <ellipse cx="110" cy="122" rx="7" ry="5" fill="oklch(0.62 0.14 40)"/>
        <text x="148" y="88" font-size="11" fill="#b8ad9c" font-weight="700" opacity=".8">z</text>

        <div class="empty-title">还没有教案</div>

      </div>
      <button class="empty-btn">生成第一份教案</button>
    </div>
    <div class="label" style="margin-top:8px;text-align:center">空状态 Empty</div>
  </div>

  <!-- Loading -->

    <div class="loading-card">

      </div>
      <div class="loading-dots"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div>
    </div>
    <div class="label" style="text-align:center">加载状态 Loading</div>

    <!-- Error state -->
    <div class="error-card">
      <div style="font-size:11px;color:oklch(0.47 0.11 38);font-weight:600;text-align:center">⚠ 生成失败</div>

</div>
</body>
</html>
